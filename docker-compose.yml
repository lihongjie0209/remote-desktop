version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: remote-desktop/server:latest
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      RUST_LOG: info
    command:
      - "--host=0.0.0.0"
      - "--port=50051"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s